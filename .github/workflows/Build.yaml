name: geosite.dat Üret

on:
  push:
    paths:
      - 'tr-domains.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu Çek
        uses: actions/checkout@v6

      - name: Go Kurulumu
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false  # repo'da go.sum olmadığı için uyarıyı bastırır

      - name: domain-list-community Klonla
        run: git clone --depth=1 https://github.com/v2fly/domain-list-community.git

      - name: TR Domainlerini Enjekte Et ve Derle
        run: |
          # Kendi TR listemizi orijinalin üstüne yaz
          cp tr-domains.txt domain-list-community/data/tr

          # geosite.dat olarak derle
          cd domain-list-community
          go run ./ --datapath=./data --outputdir=../ --outputname=geosite.dat

      - name: geosite.dat Commit Et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add geosite.dat
          git diff --staged --quiet || git commit -m "chore: geosite.dat yenilendi"
          git push
