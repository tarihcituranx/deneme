name: geosite.dat Üret

on:
  push:
    paths:
      - 'tr-domains.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Go Kurulumu
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: v2dat Aracını Yükle (Orijinal Kaynak)
        run: go install github.com/urlesistiana/v2dat/cmd/v2dat@latest

      - name: Base geosite.dat İndir (Loyalsoldier)
        run: wget -q -O geosite.dat https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat

      - name: Parçala, TR'yi Enjekte Et ve Yeniden Derle
        run: |
          # 1. Loyalsoldier dosyasını unpacked klasörüne çıkart
          ~/go/bin/v2dat unpack geosite -o ./unpacked geosite.dat
          
          # 2. Senin kendi tr-domains.txt dosyanı, orijinal tr listesinin üstüne yaz
          cp tr-domains.txt ./unpacked/tr
          
          # 3. Klasörü tekrar kusursuz bir geosite.dat olarak paketle
          ~/go/bin/v2dat pack geosite -o . -d ./unpacked
          
          # Temizlik
          rm -rf ./unpacked

      - name: geosite.dat'ı Commit Et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add geosite.dat
          git diff --staged --quiet || git commit -m "chore: geosite.dat urlesistiana/v2dat ile yenilendi"
          git push
