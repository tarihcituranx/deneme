name: geosite.dat Üret

on:
  push:
    paths:
      - 'tr-domains.txt'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Base geosite.dat indir (Loyalsoldier)
        run: wget -q -O loyalsoldier-geosite.dat https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/geosite.dat

      - name: Birleştir ve üret
        run: python3 build_geosite.py

      - name: geosite.dat'ı commit et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add geosite.dat
          git diff --staged --quiet || git commit -m "chore: geosite.dat yenilendi"
          git push
